name: CI - PR Quality Gate

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR to save runner minutes.
concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: all jobs only need read access unless overridden.
permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./prisma/dev.db' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret' }}
  DEFAULT_ADMIN_EMAIL: ${{ vars.DEFAULT_ADMIN_EMAIL || 'ci-admin@example.com' }}
  DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD || 'ci-admin-password' }}
  NODE_ENV: ${{ vars.NODE_ENV || 'test' }}

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Prepare CI environment
        uses: ./.github/actions/setup-ci-env

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Remove CI .env file
        if: always()
        run: rm -f .env

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Prepare CI environment
        uses: ./.github/actions/setup-ci-env

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Remove CI .env file
        if: always()
        run: rm -f .env

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-pr-${{ github.event.pull_request.number }}
          path: |
            .next/
            npm-debug.log*
          retention-days: 3

  # ── E2E Tests ─────────────────────────────────────────────────────────────
  # Only runs after a successful Build to avoid spending runner time when
  # the application itself does not compile.
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Prepare CI environment
        uses: ./.github/actions/setup-ci-env

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Remove CI .env file
        if: always()
        run: rm -f .env

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 14
