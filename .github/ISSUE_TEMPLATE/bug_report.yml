name: 🐛 Relato de Bug
description: Reporte um comportamento inesperado ou erro no sistema.
labels: [bug, triagem]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um bug! Preencha os campos abaixo com o máximo de detalhes possível.

  - type: textarea
    id: description
    attributes:
      label: Descrição do problema
      description: Descreva claramente o que está acontecendo de errado.
      placeholder: 'Ao clicar em "Entrar no Sistema" sem preencher os campos, o sistema exibe uma mensagem incorreta...'
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Descreva o passo a passo para reproduzir o problema.
      value: |
        1. Acesse a página '...'
        2. Clique em '...'
        3. Observe o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
      description: O que está acontecendo de fato?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / vídeos
      description: Adicione capturas de tela ou gravações se disponíveis.

  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      options:
        - 🔴 Crítico — sistema inacessível ou perda de dados
        - 🟠 Alto — funcionalidade principal quebrada
        - 🟡 Médio — funcionalidade secundária afetada
        - 🟢 Baixo — problema cosmético ou menor
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Ambiente
      description: 'Ex: Chrome 124, Windows 11 / Firefox 125, Ubuntu 22.04'
      placeholder: 'Navegador, SO, versão do Node...'
    validations:
      required: false
