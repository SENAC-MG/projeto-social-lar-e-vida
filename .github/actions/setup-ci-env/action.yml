name: Setup CI environment
description: Validates required env vars and generates a restricted .env file for CI jobs
runs:
  using: composite
  steps:
    - name: Validate required environment variables
      shell: bash
      run: |
        missing=0
        for key in DATABASE_URL JWT_SECRET DEFAULT_ADMIN_EMAIL DEFAULT_ADMIN_PASSWORD NODE_ENV; do
          if [ -z "${!key}" ]; then
            echo "::error::Missing required variable: $key"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

    - name: Generate .env file for CI
      shell: bash
      run: |
        {
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
          printf 'DEFAULT_ADMIN_EMAIL=%s\n' "$DEFAULT_ADMIN_EMAIL"
          printf 'DEFAULT_ADMIN_PASSWORD=%s\n' "$DEFAULT_ADMIN_PASSWORD"
          printf 'NODE_ENV=%s\n' "$NODE_ENV"
        } > .env
        chmod 600 .env
